<script>
function toggleFavorites(){
  const quote = document.getElementById("quoteList");
  const fav = document.getElementById("favoritesCard");
  const journal = document.getElementById("journalCard");

  if(fav.classList.contains("active")){
    fav.classList.remove("active");
  } else {
    fav.classList.add("active");
    quote.classList.remove("active");
    journal.classList.remove("active");
  }
}

/* ===== LOOPING PERSISTENT NOW WATCHING ===== */
let watchInterval;

function setWatching(title, category, genre, defaultStartSeconds, totalSeconds, imageUrl) {
  const wrapper = document.getElementById("watchingWrapper");
  
  if (!title || title.trim() === "" || !imageUrl) {
    wrapper.style.display = "none";
    clearInterval(watchInterval);
    return;
  }

  wrapper.style.display = "block";
  document.getElementById("watchImage").src = imageUrl;
  document.getElementById("watchImage").style.display = "block";
  document.getElementById("watchTitle").textContent = title;
  document.getElementById("watchGenre").textContent = genre;
  document.getElementById("watchCategory").textContent = "WATCHING " + category.toUpperCase();
  
  clearInterval(watchInterval);

  // Gamitin ang LocalStorage para i-save ang oras
  let savedTitle = localStorage.getItem("watchTitle");
  let now = defaultStartSeconds;

  // Kung parehas pa rin ang pinapanood natin, kunin ang saved time
  if (savedTitle === title) {
    let savedTime = localStorage.getItem("watchTime");
    if (savedTime !== null) {
      now = parseInt(savedTime, 10);
    }
  } else {
    // Kung bago ang pinapanood, i-save ang bagong title
    localStorage.setItem("watchTitle", title);
    localStorage.setItem("watchTime", now);
  }

  function updateUI() {
    if (now >= totalSeconds) {
      now = 0; // Babalik sa 0:00 kapag natapos (Looping)
    } else {
      now++;
    }

    // Save agad sa browser para hindi mawala pag nag-refresh
    localStorage.setItem("watchTime", now);

    const percent = (now / totalSeconds) * 100;
    document.getElementById("watchProgress").style.width = percent + "%";
    document.getElementById("watchCurrent").textContent = formatTime(now);
    document.getElementById("watchTotal").textContent = formatTime(totalSeconds);
  }

  updateUI();
  watchInterval = setInterval(updateUI, 1000); 
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return m + ":" + (s < 10 ? "0" : "") + s;
}

</script>

function updateBookDisplay(index) {
  const book = myBooks[index];
  const titleEl = document.getElementById("bookTitle");
  const authorEl = document.getElementById("bookAuthor");
  const coverEl = document.getElementById("bookCover");
  const ratingEl = document.getElementById("bookRating");

  // Smooth transition effect
  titleEl.style.opacity = 0;
  authorEl.style.opacity = 0;
  coverEl.style.opacity = 0;

  setTimeout(() => {
    titleEl.textContent = book.title;
    authorEl.textContent = book.author;
    coverEl.src = book.cover;
    
    // Star Rating Logic
    let starHtml = "";
    for(let i = 1; i <= 5; i++) {
      if(i <= Math.floor(book.rating)) {
        starHtml += '<i class="fas fa-star"></i> ';
      } else if(book.rating % 1 !== 0 && i === Math.ceil(book.rating)) {
        starHtml += '<i class="fas fa-star-half-alt"></i> ';
      } else {
        starHtml += '<i class="far fa-star"></i> ';
      }
    }
    starHtml += `<span style="color:white; opacity:0.6; font-size:10px; margin-left:4px;">${book.stars}</span>`;
    ratingEl.innerHTML = starHtml;

    // Fade back in
    titleEl.style.opacity = 1;
    authorEl.style.opacity = 0.6;
    coverEl.style.opacity = 1;
  }, 150);
}

function handleGesture() {
  if (touchendX < touchstartX - 50) {
    // Swipe Left - Next
    currentBookIndex = (currentBookIndex + 1) % myBooks.length;
    updateBookDisplay(currentBookIndex);
  }
  if (touchendX > touchstartX + 50) {
    // Swipe Right - Previous
    currentBookIndex = (currentBookIndex - 1 + myBooks.length) % myBooks.length;
    updateBookDisplay(currentBookIndex);
  }
}

const bookCard = document.getElementById('bookCard');
bookCard.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
bookCard.addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; handleGesture(); });

// Load first book on start
document.addEventListener("DOMContentLoaded", () => updateBookDisplay(0));

function toggleSideMenu() {
  const menu = document.getElementById("sideMenu");
  const overlay = document.getElementById("menuOverlay");

  if (menu.style.right === "0px") {
    menu.style.right = "-260px";
    overlay.style.display = "none";
  } else {
    menu.style.right = "0px";
    overlay.style.display = "block";
  }
}
  
</script>
