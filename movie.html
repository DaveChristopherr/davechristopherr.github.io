<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies & Series - Dave Christopher</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap');

:root {
  --bg:          #000000;
  --surface:     #080808;
  --surface-2:   #0d0d0d;
  --surface-3:   #111111;
  --border:      #181818;
  --border-hover:#222222;
  --text:        #ffffff;
  --text-muted:  rgba(255,255,255,0.45);
  --text-dim:    rgba(255,255,255,0.22);
  --accent:      rgba(255,255,255,0.04);
  --radius-sm:   10px;
  --radius-md:   14px;
  --radius-lg:   18px;
  --shadow-sm:   0 1px 4px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.35);
  --shadow-md:   0 8px 32px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.5);
  --shadow-lg:   0 24px 64px rgba(0,0,0,0.85), 0 8px 24px rgba(0,0,0,0.6);
  --transition:  0.28s cubic-bezier(0.4,0,0.2,1);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Quicksand', sans-serif;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* ─── FADE-IN ON LOAD ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0);    }
}

.content > * {
  animation: fadeUp 0.6s ease both;
}
.content > *:nth-child(1) { animation-delay: 0.06s; }
.content > *:nth-child(2) { animation-delay: 0.14s; }
.content > *:nth-child(3) { animation-delay: 0.22s; }

/* ─── BACK ICON ─── */
.back-icon {
  position: fixed;
  top: 20px;
  left: 22px;
  font-size: 19px;
  cursor: pointer;
  opacity: 0.5;
  transition: opacity var(--transition), transform var(--transition);
  z-index: 101;
  color: var(--text);
  text-decoration: none;
}

.back-icon:hover {
  transform: translateX(-4px) scale(1.1);
  opacity: 1;
}

/* ─── CONTENT WRAPPER ─── */
.content {
  width: 100%;
  max-width: 580px;
  margin-top: 60px;
  padding: 28px 18px 56px;
}

.header-section {
  text-align: center;
  margin-bottom: 40px;
}

h1 { 
  font-size: 24px; 
  letter-spacing: 4px; 
  font-weight: 700; 
  text-transform: uppercase; 
  margin-bottom: 8px; 
  color: var(--text);
  line-height: 1.3;
}

.subtitle { 
  font-size: 10px; 
  color: var(--text-muted); 
  letter-spacing: 2px; 
  text-transform: uppercase; 
  font-weight: 600; 
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

/* ─── CONTROLS ROW ─── */
.control-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 1px solid var(--border);
}

.count-text {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--text-muted);
  text-transform: uppercase;
}

.count-text strong {
  color: var(--text);
  font-size: 13px;
}

.filter-btn {
  background: var(--surface-2);
  border: 1px solid var(--border);
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 9.5px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 6px;
}

.filter-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  pointer-events: none;
}

.filter-btn:hover {
  border-color: var(--border-hover);
  background: var(--surface-3);
  transform: translateY(-1px);
}

/* ─── MOVIE CARD STYLE ─── */
.movie-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.movie-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 18px 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition:
    box-shadow var(--transition),
    border-color var(--transition),
    background var(--transition),
    transform var(--transition);
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
  animation: fadeIn 0.4s ease both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.movie-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  pointer-events: none;
}

.movie-card:hover {
  background: var(--surface-3);
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.movie-title {
  font-size: 14.5px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.2px;
}

.movie-rating {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 65px;
  justify-content: flex-end;
}

.star-icon {
  color: #ffb400;
  font-size: 13px;
}

/* ─── BACK TO TOP BUTTON ─── */
.back-to-top {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: var(--surface-2);
  color: var(--text-muted);
  border: 1px solid var(--border);
  width: 45px;
  height: 45px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  z-index: 100;
  opacity: 0;
  visibility: hidden;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-sm);
}

.back-to-top.visible {
  opacity: 1;
  visibility: visible;
}

.back-to-top:hover {
  background: var(--surface-3);
  color: var(--text);
  border-color: var(--border-hover);
  transform: translateY(-5px);
  box-shadow: var(--shadow-md);
}

/* ─── MOBILE TOUCH TARGETS ─── */
@media (max-width: 480px) {
  .content {
    padding: 24px 16px 60px;
  }
  .movie-card {
    padding: 16px 18px;
  }
}
</style>
</head>

  } else {
    backToTopBtn.classList.remove("visible");

let highFirst = true;

const itemList = document.getElementById("itemList");
const countText = document.getElementById("countText");
const sortIcon = document.getElementById("sortIcon");

countText.innerHTML = `<strong>${items.length}</strong> Titles`;

function renderList() {
  itemList.innerHTML = "";

  items.sort((a,b) => {
    return highFirst ? b.rating - a.rating : a.rating - b.rating;
  });

  items.forEach((item, index) => {
    const card = document.createElement("div");
    card.className = "movie-card";
    
    // Add cascading delay for animation
    card.style.animationDelay = `${index * 0.015}s`;

    card.innerHTML = `
      <div class="title-group">
        <div class="title">${item.title}</div>
      </div>
      <div class="movie-rating">
        <i class="fas fa-star star-icon"></i> ${item.rating}/10
      </div>
    `;

    itemList.appendChild(card);
  });
}

function toggleSort() {
  highFirst = !highFirst;
  if(highFirst) {
    sortIcon.className = "fas fa-sort-amount-down";
  } else {
    sortIcon.className = "fas fa-sort-amount-up";
  }
  renderList();
}
