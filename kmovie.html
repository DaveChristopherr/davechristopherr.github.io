<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEVXDAVE K-Movies</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Quicksand', sans-serif;
}

body {
  background: #050505; /* Deep professional black */
  color: #ededed;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* TOP BAR */
.app-bar {
  padding: 50px 25px 30px;
  text-align: center;
  background: transparent;
  max-width: 600px;
  margin: 0 auto;
}

.app-bar h1 {
  font-size: 22px;
  letter-spacing: 3px;
  font-weight: 600;
  text-transform: uppercase;
  color: #ffffff;
  margin-bottom: 8px;
}

.last-updated {
  font-size: 11px;
  color: #888888;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 20px;
  text-transform: uppercase;
}

.last-updated svg {
  width: 12px;
  height: 12px;
  fill: currentColor;
}

.rating-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: #aaaaaa;
  border-bottom: 1px solid #1a1a1a;
  padding-bottom: 15px;
}

.sort-btn {
  background: transparent;
  border: 1px solid #333333;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: all 0.2s ease;
}

.sort-btn:hover {
  background: #ffffff;
  color: #000000;
}

/* CONTENT */
.content {
  padding: 0 20px;
  max-width: 600px;
  margin: auto;
}

/* CARDS: Minimalist & Clean */
.card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #0a0a0a;
  border: 1px solid #1a1a1a;
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 12px;
  transition: transform 0.2s ease, border-color 0.2s ease;
}

.card:hover {
  transform: translateY(-2px);
  border-color: #444444;
  background: #0f0f0f;
}

.title-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.title {
  font-size: 14px;
  letter-spacing: 0.5px;
  font-weight: 500;
  color: #ffffff;
}

.rating {
  font-weight: 600;
  font-size: 12px;
  color: #aaaaaa;
  display: flex;
  align-items: center;
  gap: 4px;
}

.star {
  color: #ffb400;
  font-size: 14px;
}

/* SCROLLBAR CUSTOMIZATION */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: #050505;
}
::-webkit-scrollbar-thumb {
  background: #222222;
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
  background: #444444;
}
</style>
</head>

<body>

<div class="app-bar">
  <h1>K-Movies Watched</h1>
  <div class="last-updated">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm0 448c-110.5 0-200-89.5-200-200S145.5 56 256 56s200 89.5 200 200-89.5 200-200 200zm61.8-104.4l-84.9-61.7c-3.1-2.3-4.9-5.9-4.9-9.7V116c0-6.6 5.4-12 12-12h32c6.6 0 12 5.4 12 12v141.7l66.8 48.6c5.4 3.9 6.5 11.4 2.6 16.8L334.6 349c-3.9 5.3-11.4 6.5-16.8 2.6z"/>
    </svg>
    Last updated: March 22, 2026
  </div>

  <div class="rating-row">
    <span id="countText"></span>
    <div class="sort-btn" onclick="toggleSort()">Sort Rating ↑↓</div>
  </div>
</div>

<div class="content">
  <div id="itemList"></div>
</div>

<script>
const items = [
  { title: "The Flu", rating: 8 },
  { title: "Parasite", rating: 10 },
  { title: "1987: When the Day Comes", rating: 8 },
  { title: "Train to Busan", rating: 9 },
  { title: "Shark", rating: 7 },
  { title: "Ditto", rating: 8 },
  { title: "20th Century Girl", rating: 10 },
  { title: "My Little Bride", rating: 7 },
  { title: "Peninsula", rating: 8 },
  { title: "High Five", rating: 7 },
  { title: "The Moon", rating: 8 },
  { title: "Brave Citizen", rating: 9 },
  { title: "Officer Black Belt", rating: 8 },
  { title: "The Gangster, the Cop, and the Devil", rating: 7 },
  { title: "Secretly, Greatly", rating: 6 },
  { title: "Revelations", rating: 8 },
  { title: "Tunnel", rating: 7 },
  { title: "Project Silence", rating: 8 },
  { title: "Pawn", rating: 8 },
  { title: "My Daughter Is a Zombie", rating: 7 },
  { title: "Holy Night: Demon Hunter", rating: 8 },
  { title: "Alive", rating: 9 },
  { title: "Zombie for Sale", rating: 8 },
  { title: "The Great Flood", rating: 8 },
  { title: "Escape", rating: 8 },
  { title: "Sinkhole", rating: 9 },
  { title: "Hijack", rating: 9 },
  { title: "Midnight Sun", rating: 8 },
  { title: "Dragged", rating: 8 },
  { title: "The Secret Zoo", rating: 8 },
  { title: "Target", rating: 8 },
  { title: "Unlocked", rating: 9 },
  { title: "No Other Choice", rating: 9 },
  { title: "Wall to Wall", rating: 7 },
  { title: "Shark 2: The Storm", rating: 8 },
  { title: "My Sassy Girl", rating: 10 },
  { title: "Dokgo Rewind", rating: 8 },
  { title: "Even if This Love Disappears from the World Tonight", rating: 9 },
  { title: "Love Untangled", rating: 9 },
  { title: "Han Gong-ju", rating: 7 },
  { title: "Exit", rating: 8 },
  { title: "Pavave", rating: 8 },
  { title: "Project Y", rating: 9 },
  { title: "Streaming", rating: 7 },
  { title: "You Are The Apple of My Eye", rating: 9 },
  { title: "The Ugly", rating: 7 },
  { title: "Mantis", rating: 8 },
  { title: "The prophecy", rating: 8 },
  { title: "Sugar", rating: 9 },
  { title: "Sister", rating: 7 }
];

let highFirst = true;

const itemList = document.getElementById("itemList");
const countText = document.getElementById("countText");

countText.innerHTML = `<strong>${items.length}</strong> Titles Watched`;

function renderList(){
  itemList.innerHTML = "";

  items.sort((a,b) => {
    return highFirst ? b.rating - a.rating : a.rating - b.rating;
  });

  items.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title-group">
        <div class="title">${item.title}</div>
      </div>
      <div class="rating">
        <span class="star">★</span> ${item.rating}/10
      </div>
    `;

    itemList.appendChild(card);
  });
}

function toggleSort(){
  highFirst = !highFirst;
  renderList();
}

renderList();
</script>

</body>
</html>
