<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap');

:root {
  --bg:          #000000;
  --surface:     #080808;
  --surface-2:   #0d0d0d;
  --surface-3:   #111111;
  --border:      #181818;
  --border-hover:#222222;
  --text:        #ffffff;
  --text-muted:  rgba(255,255,255,0.45);
  --text-dim:    rgba(255,255,255,0.22);
  --accent:      rgba(255,255,255,0.04);
  --radius-sm:   10px;
  --radius-md:   14px;
  --radius-lg:   18px;
  --shadow-sm:   0 1px 4px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.35);
  --shadow-md:   0 8px 32px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.5);
  --shadow-lg:   0 24px 64px rgba(0,0,0,0.85), 0 8px 24px rgba(0,0,0,0.6);
  --transition:  0.28s cubic-bezier(0.4,0,0.2,1);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Quicksand', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background: var(--bg); 
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* ─── FADE-IN ON LOAD ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0);    }
}

.content > * {
  animation: fadeUp 0.6s ease both;
}
.content > *:nth-child(1) { animation-delay: 0.06s; }
.content > *:nth-child(2) { animation-delay: 0.14s; }
.content > *:nth-child(3) { animation-delay: 0.22s; }
.content > *:nth-child(4) { animation-delay: 0.30s; }
.content > *:nth-child(5) { animation-delay: 0.38s; }

/* ─── FIXED MENU ICON ─── */
.menu-icon {
  position: fixed;
  top: 20px;
  right: 22px;
  font-size: 19px;
  cursor: pointer;
  opacity: 0.5;
  transition: opacity var(--transition), transform var(--transition);
  z-index: 101;
  color: var(--text);
}

.menu-icon:hover {
  transform: scale(1.1);
  opacity: 1;
}

/* ─── SIDE MENU ─── */
#sideMenu {
  position: fixed;
  top: 0;
  right: -270px;
  width: 260px;
  height: 100%;
  background: #060606;
  border-left: 1px solid var(--border);
  z-index: 1200;
  transition: right 0.38s cubic-bezier(0.4,0,0.2,1);
  padding: 56px 18px 36px;
  box-shadow: -20px 0 60px rgba(0,0,0,0.9);
  overflow-y: auto;
}

#menuOverlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.65);
  z-index: 1150;
  backdrop-filter: blur(6px);
  animation: fadeUp 0.2s ease both;
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 13px 15px;
  border-radius: var(--radius-md);
  font-size: 13.5px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  transition: background var(--transition), color var(--transition), border-color var(--transition);
  text-decoration: none;
  margin-bottom: 3px;
  border: 1px solid transparent;
  letter-spacing: 0.2px;
}

.menu-item i {
  font-size: 12.5px;
  width: 15px;
  text-align: center;
  opacity: 0.65;
  transition: opacity var(--transition);
}

.menu-item:hover,
.menu-item.active {
  background: rgba(255,255,255,0.04);
  color: var(--text);
  border-color: var(--border);
}

.menu-item:hover i,
.menu-item.active i {
  opacity: 1;
}

/* ─── MAIN CONTENT ─── */
.content {
  width: 100%;
  max-width: 580px; 
  margin-top: 60px; 
  padding: 28px 18px 80px;
}

/* ─── SLEEK TOP BAR W/ LETTERBOXD LOGO ─── */
.lb-top-bar {
  display: flex;
  justify-content: center; 
  align-items: center;
  margin-bottom: 30px;
  position: relative;
}

.lb-top-bar h2 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text);
}

/* ─── LETTERBOXD 3 DOTS LOGO ─── */
.lb-logo {
  display: flex;
  align-items: center;
}

.lb-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.dot-green { background-color: #00e054; position: relative; z-index: 3; }
.dot-orange { background-color: #ff8000; margin-left: -3px; position: relative; z-index: 2; }
.dot-blue { background-color: #40bcf4; margin-left: -3px; position: relative; z-index: 1; }


/* ─── PROFILE HEADER ─── */
.profile-header {
  text-align: center;
  margin-bottom: 40px;
}

.profile-img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--border-hover);
  margin-bottom: 15px;
  box-shadow: var(--shadow-sm);
}

/* ─── UPDATED FOLLOW BUTTON ─── */
.follow-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 22px;
  border-radius: 50px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-decoration: none;
  transition: all var(--transition);
  margin-bottom: 18px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}

.follow-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  pointer-events: none;
}

.follow-btn i {
  font-size: 11px;
  opacity: 0.7;
}

.follow-btn:hover {
  background: var(--surface-3);
  border-color: var(--border-hover);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.follow-btn:hover i {
  opacity: 1;
}

.bio-text {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
  font-weight: 500;
  padding: 0 10px;
  letter-spacing: 0.2px;
}

/* ─── LETTERBOXD SECTIONS ─── */
.lb-section {
  margin-bottom: 40px;
}

.section-title {
  font-size: 9.5px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 2.6px;
  text-transform: uppercase;
  margin-bottom: 15px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
  padding-left: 2px;
}

/* ─── POSTER GRID ─── */
.poster-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.poster-wrapper {
  display: flex;
  flex-direction: column;
}

.poster-img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
  cursor: pointer;
}

.poster-img:hover {
  transform: translateY(-4px);
  border-color: var(--border-hover);
  box-shadow: var(--shadow-md);
}

/* ─── RATINGS STARS ─── */
.star-rating {
  color: #00e054; 
  font-size: 8px;
  text-align: center;
  margin-top: 8px;
  letter-spacing: 1px;
  opacity: 0.9;
}

/* ─── MORE ACTIVITY LINK ─── */
.more-link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12.5px;
  color: var(--text-muted);
  text-decoration: none;
  font-weight: 600;
  margin-top: 15px;
  padding: 10px 4px;
  transition: color var(--transition);
  letter-spacing: 0.2px;
}

.more-link:hover {
  color: var(--text);
}

/* ─── BAR CHART RATINGS ─── */
.chart-container {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 4px;
  height: 60px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 2px;
  margin-top: 20px;
}

.chart-bar {
  background: rgba(255, 255, 255, 0.15);
  width: 16%;
  border-radius: 2px 2px 0 0;
  transition: background var(--transition);
  cursor: pointer;
}

.chart-bar:hover {
  background: #00e054; 
}

.chart-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 8px;
  color: #00e054;
  opacity: 0.8;
}

/* ─── MOBILE TOUCH TARGETS ─── */
@media (max-width: 480px) {
  .content {
    padding: 24px 16px 60px;
  }
  .poster-grid {
    gap: 8px;
  }
}
</style>
</head>

<script>
function toggleSideMenu() {
  const menu = document.getElementById("sideMenu");
  const overlay = document.getElementById("menuOverlay");
  if (menu.style.right === "0px") {
    menu.style.right = "-270px";
    overlay.style.display = "none";
  } else {
    menu.style.right = "0px";
    overlay.style.display = "block";
  }
}
</script>
