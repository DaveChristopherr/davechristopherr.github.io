<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letterboxd - Dave Christopher</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Quicksand', sans-serif;
}

body {
  background: #000000; 
  color: #ffffff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* FIXED MENU ICON */
.menu-icon {
  position: fixed;
  top: 30px;
  right: 30px;
  font-size: 22px;
  cursor: pointer;
  z-index: 101;
  color: #ffffff;
  opacity: 0.7;
  transition: 0.3s ease;
}

.menu-icon:hover {
  opacity: 1;
  transform: scale(1.1);
}

/* SIDE MENU */
#sideMenu {
  position: fixed;
  top: 0;
  right: -260px;
  width: 260px;
  height: 100%;
  background: #0a0a0a;
  border-left: 1px solid #1f1f1f;
  z-index: 110;
  transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  padding: 60px 25px;
  box-shadow: -10px 0 30px rgba(0,0,0,0.8);
}

.menu-item {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  color: rgba(255,255,255,0.7);
  transition: 0.3s;
  text-decoration: none;
  margin-bottom: 8px;
}

.menu-item:hover, .menu-item.active {
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.05);
}

#menuOverlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 105;
  backdrop-filter: blur(5px);
}

/* MAIN CONTENT */
.content {
  width: 100%;
  max-width: 600px; 
  margin-top: 30px; 
  padding: 20px 20px 80px;
}

/* SLEEK TOP BAR W/ LETTERBOXD LOGO */
.lb-top-bar {
  display: flex;
  justify-content: center; /* Naka-center na dahil tinanggal ang share icon */
  align-items: center;
  margin-bottom: 30px;
  position: relative;
}

.lb-top-bar h2 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* LETTERBOXD 3 DOTS LOGO (Pure CSS) */
.lb-logo {
  display: flex;
  align-items: center;
}

.lb-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.dot-green { background-color: #00e054; position: relative; z-index: 3; }
.dot-orange { background-color: #ff8000; margin-left: -3px; position: relative; z-index: 2; }
.dot-blue { background-color: #40bcf4; margin-left: -3px; position: relative; z-index: 1; }


/* PROFILE HEADER */
.profile-header {
  text-align: center;
  margin-bottom: 30px;
}

.profile-img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

/* UPDATED FOLLOW BUTTON */
.follow-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  color: #ffffff;
  padding: 8px 20px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-decoration: none;
  transition: 0.3s ease;
  margin-bottom: 18px;
}

.follow-btn i {
  font-size: 11px;
  opacity: 0.7;
}

.follow-btn:hover {
  background: #ffffff;
  color: #000000;
  border-color: #ffffff;
}

.follow-btn:hover i {
  color: #000000;
}

.bio-text {
  font-size: 13px;
  color: #a7a7a7;
  line-height: 1.6;
  font-weight: 500;
  padding: 0 10px;
}

/* LETTERBOXD SECTIONS */
.lb-section {
  margin-top: 40px;
}

.section-title {
  font-size: 11px;
  font-weight: 600;
  color: #888888;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 15px;
  border-bottom: 1px solid #1a1a1a;
  padding-bottom: 8px;
}

/* POSTER GRID */
.poster-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.poster-wrapper {
  display: flex;
  flex-direction: column;
}

.poster-img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  transition: transform 0.2s ease, border-color 0.2s ease;
  cursor: pointer;
}

.poster-img:hover {
  transform: scale(1.05);
  border-color: rgba(255,255,255,0.4);
}

/* RATINGS STARS */
.star-rating {
  color: #00e054; 
  font-size: 8px;
  text-align: center;
  margin-top: 6px;
  letter-spacing: 1px;
}

/* MORE ACTIVITY LINK */
.more-link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: #a7a7a7;
  text-decoration: none;
  font-weight: 500;
  margin-top: 15px;
  padding: 10px 0;
  transition: 0.2s ease;
}

.more-link:hover {
  color: #ffffff;
}

/* BAR CHART RATINGS */
.chart-container {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 4px;
  height: 60px;
  border-bottom: 1px solid #222;
  padding-bottom: 2px;
  margin-top: 20px;
}

.chart-bar {
  background: #445566;
  width: 16%;
  border-radius: 2px 2px 0 0;
  transition: background 0.3s ease;
  cursor: pointer;
}

.chart-bar:hover {
  background: #00e054; 
}

.chart-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 8px;
  color: #00e054;
}

</style>
</head>

<body>

</div>

  <nav style="margin-top:20px;">

    <a href="aboutme.html" class="menu-item"><i class="fas fa-user"></i> About me</a>
    <a href="quotes.html" class="menu-item"><i class="fas fa-quote-left"></i> Quotes</a>
    <a href="favorites.html" class="menu-item"><i class="fas fa-heart"></i> Favorites</a>
    <a href="spotify.html" class="menu-item"><i class="fab fa-spotify"></i> Spotify</a>
    <a href="chess.html" class="menu-item"><i class="fas fa-chess-knight"></i> Chess</a>
    <a href="letterboxd.html" class="menu-item active"><i class="fas fa-film"></i> Letterboxd</a>
    <a href="projects.html" class="menu-item"><i class="fas fa-code"></i> Stuff</a>
  </nav>
</div>

<div class="content">

  <div class="lb-top-bar">
    <h2>
      <div class="lb-logo">
        <span class="lb-dot dot-green"></span>
        <span class="lb-dot dot-orange"></span>

      </div>
      Dave Christopher
    </h2>
  </div>

  <div class="profile-header">
    <img src="AlbertCamus.jpg" alt="Dave Christopher" class="profile-img">
    <br>
    
    <a href="https://boxd.it/hrA6n" class="follow-btn" target="_blank">
      Follow on Letterboxd <i class="fas fa-arrow-up-right-from-square"></i>
    </a>
    
    <p class="bio-text">I don't have time to put the rest of what I watched, I don't have time. Please feel free to follow my film journey.</p>
  </div>

  <div class="lb-section">
    <div class="section-title">Favorites</div>
    <div class="poster-grid">
      <img src="20th_Century_Girl.jpg" alt="20th Century Girl" class="poster-img">
      <img src="Dead_poets_society.png" alt="Dead Poets Society" class="poster-img">
      <img src="Parasite_(2019_film).png" alt="Parasite" class="poster-img">
      <img src="Five_hundred_days.jpg" alt="500 Days Of Summer" class="poster-img">
    </div>
  </div>

  <div class="lb-section">
    <div class="section-title">Recent Activity</div>
    <div class="poster-grid">
      
      <div class="poster-wrapper">
        <img src="Sugar_KM-p.jpeg" alt="Sugar" class="poster-img">

          <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
        </div>

      <div class="poster-wrapper">

      <div class="poster-wrapper">

        <img src="Pavane_KM-p1.jpg" alt="Pavane" class="poster-img">

          <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
        </div>
      </div>

    </div>

    <a href="https://boxd.it/hrA6n" target="_blank" class="more-link">
      More activity <i class="fas fa-chevron-right" style="font-size: 10px;"></i>
    </a>

  <div class="lb-section">
    <div class="section-title">Ratings</div>
    
    <div class="chart-container">
      <div class="chart-bar" style="height: 5%;"></div>

      <span><i class="fas fa-star"></i></span>
      <span>
        <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
      </span>
    </div>
  </div>

</div>

<script>
function toggleSideMenu() {
  const menu = document.getElementById("sideMenu");
  const overlay = document.getElementById("menuOverlay");
  if (menu.style.right === "0px") {
    menu.style.right = "-260px";
    overlay.style.display = "none";
  } else {
    menu.style.right = "0px";
    overlay.style.display = "block";
  }
}
</script>

</body>
</html>
